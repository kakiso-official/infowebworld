<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - InfoWebWorld Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',sans-serif;font-size:14px;color:#1A1A2E;background:#F8FAFC;min-height:100vh;display:flex;flex-direction:column;}a{text-decoration:none;color:#1B6CA8;}

.signin-container{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.signin-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;border:1px solid #F1F5F9;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.signin-card h1{font-size:28px;text-align:center;margin-bottom:4px;}
.signin-card .subtitle{text-align:center;color:#64748B;margin-bottom:28px;font-size:14px;}
.social-auth{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;font-family:inherit;transition:all .2s;}
.social-btn:hover{border-color:#1B6CA8;background:#F8FAFC;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:12px;color:#94A3B8;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#E2E8F0;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.form-group input{width:100%;padding:10px 14px;border:1px solid #E2E8F0;border-radius:8px;font-family:inherit;font-size:14px;}
.form-group input:focus{outline:none;border-color:#1B6CA8;}
.form-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;}
.form-options label{display:flex;align-items:center;gap:6px;cursor:pointer;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .2s;width:100%;}
.btn-primary{background:#0F4C75;color:#fff;}.btn-primary:hover{background:#0d3f63;}
.btn-magic{background:#F8FAFC;color:#1B6CA8;border:1px solid #E2E8F0;margin-top:12px;}
.btn-magic:hover{background:#E8F4FD;border-color:#1B6CA8;}
.signup-link{text-align:center;margin-top:20px;font-size:13px;}
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<link rel="stylesheet" href="shared/shared.css">
</head>
<body>
<div id="s-nav"></div>

<div class="signin-container">
<div class="signin-card">
  <h1>Welcome Back</h1>
  <div class="subtitle">Sign in to your InfoWebWorld Directory account</div>
  <div class="social-auth">
    <button class="social-btn">&#x1F310; Continue with Google</button>
    <button class="social-btn">&#x1F4BB; Continue with GitHub</button>
    <button class="social-btn">in Continue with LinkedIn</button>
  </div>
  <div class="divider">or sign in with email</div>
  <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@company.com"></div>
  <div class="form-group"><label>Password</label><input type="password" placeholder="Enter your password"></div>
  <div class="form-options">
    <label><input type="checkbox"> Remember me</label>
    <a href="#">Forgot password?</a>
  </div>
  <button class="btn btn-primary">Sign In</button>
  <button class="btn btn-magic">&#x2728; Send Magic Link</button>
  <div class="signup-link">Don't have an account? <a href="signup.html"><strong>Sign Up Free</strong></a></div>
</div>
</div>
<script src="shared/shared.js"></script>
</body>
</html>
